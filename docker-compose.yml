version: "3.9"
services:
  nest-app:
    build: .
    container_name: nest-app
    ports:
      - "3001:3000"
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
        - postgres

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: